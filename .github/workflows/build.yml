name: Build Binaries
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output: crypto_scanner
          - os: windows-latest
            output: crypto_scanner.exe
          - os: macos-latest
            output: crypto_scanner
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller PyQt6 requests
      - name: Build binary
        run: pyinstaller --onefile --windowed --name crypto_scanner crypto_scanner.py
      - name: Rename binary for platform
        shell: bash
        run: |
          mkdir -p release_files
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp dist/crypto_scanner.exe release_files/crypto_scanner_windows.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp dist/crypto_scanner release_files/crypto_scanner_macos
          else
            cp dist/crypto_scanner release_files/crypto_scanner_linux
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoScanner-${{ matrix.os }}
          path: release_files/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: false
          name: Crypto Scanner ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
